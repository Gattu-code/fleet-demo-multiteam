{% extends "base.html" %}
{% block title %}Ingresar | Gestión de flotas (Marketing) :: Demo{% endblock %}

{% block content %}
<div class="mx-auto max-w-md">
  <div class="rounded-lg border border-zinc-200 bg-white p-6">
    <h1 class="text-2xl font-semibold tracking-tight">Ingresar</h1>
    <p class="mt-1 text-sm text-zinc-600">Usa una cuenta demo para entrar al sistema.</p>

    <form action="/login" method="post" class="mt-6 space-y-4">
      <input type="hidden" name="next" value="{{ next }}">
      <label class="field">
        <span>Usuario</span>
        <input name="username" autocomplete="username" required>
      </label>
      <label class="field">
        <span>Contraseña</span>
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button class="rounded-md bg-zinc-950 px-4 py-2 text-sm font-medium text-white hover:bg-zinc-800" type="submit">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
